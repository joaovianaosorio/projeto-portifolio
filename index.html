<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/9ee7458646.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="shortcut icon" href="favicon.svg" type="image/svg">
    <!--
    Arquivos SVG são como arquivos XML. XML são tipo HTML só que para outras coisas. Então, o SVG usa o XML para gerar uma imagem.

    Alterando o tipo de arquivo de SVG para XML no VSCode, você consegue mudar as configurações do arquivo.
    Você pode criar a tag "<style> </style>", e, dentro dela, consegue fazer configurções como:
        path{
        fill: black;
        stroke: white;
        stroke-width: 3px;
        }

    Se por algum acaso não tiver o atributo "path" (caminho) no seu SVG, você deverá fazer um atributo para o elemento que tiver.
    -->
    <title>Portfólio Gustavo Guanabara</title>
</head>
<body>
    <header>
        <nav id="menu">
            <ul>
                <!--
                Para a inserção de emojis no menu, utilizaremos o site https://fontawesome.com/

                Você deve copiar o código do seu kit de ícones e colocar no head do HTML antes de colocar o link dos ícones!

                Após colocar o link do kit, basta pesquisar um ícone, classificar por gratuito e copiar o código dele e colar onde você quer que ele fique no seu HTML.
                -->
                <li><a href="#"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="#"><i class="fa-solid fa-brain"></i></a></li>
                <li><a href="#"><i class="fa-solid fa-graduation-cap"></i></a></li>

                <li><a href="#"><i class="fa-solid fa-moon"></i></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Em breve...</h1>
    </main>
    <footer>

    </footer>
    <script src="scripts/script.js"></script>
</body>
</html>
